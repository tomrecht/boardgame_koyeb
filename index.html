<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    <script src="game.js" defer></script>
    <style>
        body {
            margin: 0;
            touch-action: manipulation; /* Allows panning and pinch-zooming */
            overflow: hidden; /* Prevents scrolling */
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%; /* Allows it to shrink on small windows */
            height: auto !important; /* Maintains aspect ratio */
            touch-action: auto !important; /* Re-enables browser pinch-to-zoom */
        }

        /* Mobile-Specific Tweaks */
        @media (max-width: 768px) {
            canvas {
                width: 100vw; /* Force it to fill phone width */
            }
        }
    </style>
</head>
<body>
    <script>
        // Ensuring touch actions are enabled
        document.addEventListener('touchmove', function(event) {
            if (event.scale !== 1) {
                event.preventDefault(); // Prevent the default zoom action
            }
        }, { passive: false });
    </script>
</body>
</html>
